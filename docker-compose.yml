version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: gld_db
    environment:
      POSTGRES_DB: gld_db
      POSTGRES_USER: whiteghost
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
