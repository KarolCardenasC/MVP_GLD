# ===========================
# GLD - Production Properties (Render)
# ===========================

# Database connection
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Render provides PORT dynamically
server.port=${PORT:8080}

# JPA / Hibernate - let Hibernate manage schema
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Override base config: run SQL init scripts on startup to seed data
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
spring.sql.init.continue-on-error=true

# App Properties
app.upload.dir=/tmp/uploads
app.jwt.secret=${JWT_SECRET:8w03b90x21908h291b1n0u045h1n0u045h8w03b90x2190}

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Bogota
